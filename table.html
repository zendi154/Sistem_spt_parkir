<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Login | PPAT Bapenda Kota Bengkulu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            background-size: 400% 400%;
            animation: gradientFlow 12s ease infinite;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle at 10% 20%, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        @keyframes gradientFlow {
            0% {
                background-position: 0% 0%;
            }

            25% {
                background-position: 100% 50%;
            }

            50% {
                background-position: 100% 100%;
            }

            75% {
                background-position: 0% 50%;
            }

            100% {
                background-position: 0% 0%;
            }
        }

        .login-box {
            width: 420px;
            padding: 40px 35px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            border-radius: 28px;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.1) inset;
            animation: fadeInUp 0.8s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            margin-bottom: 20px;
        }

        .logo img {
            width: 70px;
            height: 70px;
            background: white;
            border-radius: 20px;
            padding: 10px;
        }

        h3 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #fff, #a0c4ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .input-group-custom {
            margin-bottom: 22px;
            text-align: left;
        }

        .input-group-custom label {
            display: block;
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.85rem;
            font-weight: 500;
        }

        .input-group-custom input {
            width: 100%;
            padding: 14px 16px;
            font-size: 0.95rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            border-radius: 18px;
            outline: none;
            color: white;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .input-group-custom input:focus {
            border-color: #4facfe;
            box-shadow: 0 0 15px rgba(79, 172, 254, 0.4);
            background: rgba(255, 255, 255, 0.15);
        }

        .input-group-custom input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .input-group-custom input.error {
            border-color: #ff4d4d;
            animation: shake 0.4s ease;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            20% {
                transform: translateX(-6px);
            }

            40% {
                transform: translateX(6px);
            }

            60% {
                transform: translateX(-3px);
            }

            80% {
                transform: translateX(3px);
            }
        }

        .password-wrapper {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: rgba(255, 255, 255, 0.7);
            transition: 0.2s;
        }

        .toggle-password:hover {
            color: white;
        }

        .error-text {
            color: #ffb3b3;
            font-size: 0.7rem;
            margin-top: 6px;
            margin-left: 12px;
            display: block;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, #4facfe, #00f2fe);
            border: none;
            border-radius: 40px;
            color: #1a1a2e;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 12px;
            box-shadow: 0 5px 15px rgba(79, 172, 254, 0.3);
        }

        .btn-login:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 25px rgba(79, 172, 254, 0.5);
        }

        .info-text {
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.8rem;
        }

        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .spinner-border {
            width: 55px;
            height: 55px;
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-top: 4px solid #4facfe;
            border-right: 4px solid #00f2fe;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            margin-top: 16px;
            color: white;
            font-weight: 500;
        }

        @media (max-width: 480px) {
            .login-box {
                width: 90%;
                padding: 30px 20px;
            }

            h3 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>

<body>
    <div class="login-box" id="loginBox">
        <div class="logo">
            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="Logo">
        </div>
        <h3>LOGIN PPAT</h3>

        <div class="input-group-custom">
            <label><i class="bi bi-person"></i> Username</label>
            <input type="text" id="username" placeholder="Masukkan username" autocomplete="off">
            <small id="userError" class="error-text"></small>
        </div>

        <div class="input-group-custom">
            <label><i class="bi bi-key"></i> Password</label>
            <div class="password-wrapper">
                <input type="password" id="password" placeholder="Masukkan password">
                <span class="toggle-password" onclick="togglePassword()">
                    <i class="bi bi-eye"></i>
                </span>
            </div>
            <small id="passError" class="error-text"></small>
        </div>

        <button class="btn-login" onclick="login()">
            <i class="bi bi-box-arrow-in-right"></i> MASUK
        </button>

        <div class="info-text">
            <i class="bi bi-shield-lock"></i> Akses sesuai role yang diberikan
        </div>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner-border"></div>
        <div class="loading-text">Memverifikasi kredensial...</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        const URL = "https://script.google.com/macros/s/AKfycbzUrIknI8zEsn_lsQrIAfUr2twP4CDSVajcK3-8VYEK2V7KrLFHJ6c5had52kWmAKeg/exec";

        // Cek apakah sudah login
        window.onload = function () {
            const token = localStorage.getItem("token");
            if (token) {
                // Verifikasi token masih valid
                fetch(`${URL}?action=check&token=${token}`)
                    .then(res => res.json())
                    .then(res => {
                        if (res.status === "valid") {
                            window.location.href = "dashbord.html";
                        }
                    });
            }
            document.getElementById("username").focus();
        };

        // Toggle password visibility
        function togglePassword() {
            const passwordInput = document.getElementById("password");
            const toggleIcon = document.querySelector(".toggle-password i");

            if (passwordInput.type === "password") {
                passwordInput.type = "text";
                toggleIcon.classList.remove("bi-eye");
                toggleIcon.classList.add("bi-eye-slash");
            } else {
                passwordInput.type = "password";
                toggleIcon.classList.remove("bi-eye-slash");
                toggleIcon.classList.add("bi-eye");
            }
        }

        // Enter key handler
        document.addEventListener("keypress", function (e) {
            if (e.key === "Enter") login();
        });

        async function login() {
            const username = document.getElementById("username");
            const passwordInput = document.getElementById("password");
            const userError = document.getElementById("userError");
            const passError = document.getElementById("passError");
            const loginBox = document.getElementById("loginBox");

            // Reset error
            username.classList.remove("error");
            passwordInput.classList.remove("error");
            userError.innerText = "";
            passError.innerText = "";

            let valid = true;
            const usernameVal = username.value.trim();

            if (!usernameVal) {
                userError.innerText = "✖ Username wajib diisi";
                username.classList.add("error");
                valid = false;
            }

            if (!passwordInput.value) {
                passError.innerText = "✖ Password wajib diisi";
                passwordInput.classList.add("error");
                valid = false;
            }

            if (!valid) {
                loginBox.classList.add("shake");
                setTimeout(() => loginBox.classList.remove("shake"), 400);
                return;
            }

            // Format email: username@mail.com
            const email = usernameVal + "@mail.com";
            const password = passwordInput.value;

            // Tampilkan loading
            document.getElementById("loadingOverlay").style.display = "flex";

            try {
                const response = await fetch(`${URL}?action=login&email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`);
                const result = await response.json();

                if (result.status === "success") {
                    localStorage.setItem("token", result.token);
                    localStorage.setItem("userRole", result.role);
                    localStorage.setItem("userName", result.name);

                    // Tampilkan sukses
                    Swal.fire({
                        icon: 'success',
                        title: 'Login Berhasil!',
                        text: `Selamat datang ${result.name || result.role}`,
                        timer: 1500,
                        showConfirmButton: false
                    });

                    // Redirect ke dashboard
                    setTimeout(() => {
                        window.location.href = "dashbord.html";
                    }, 1500);
                } else {
                    passError.innerText = "⚠ Username atau password salah";
                    passwordInput.classList.add("error");
                    loginBox.classList.add("shake");
                    setTimeout(() => loginBox.classList.remove("shake"), 400);
                    document.getElementById("loadingOverlay").style.display = "none";
                }
            } catch (error) {
                console.error("Login error:", error);
                passError.innerText = "❌ Gagal terhubung ke server";
                passwordInput.classList.add("error");
                loginBox.classList.add("shake");
                setTimeout(() => loginBox.classList.remove("shake"), 400);
                document.getElementById("loadingOverlay").style.display = "none";
            }
        }

        // Cegah klik kanan
        document.addEventListener("contextmenu", function (e) {
            e.preventDefault();
        });
    </script>
</body>

</html>
