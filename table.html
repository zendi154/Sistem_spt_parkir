<!DOCTYPE html>
<html>

<head>
    <title>FORM LOGIN</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;

            /* BACKGROUND RGB ANIMASI */
            background: linear-gradient(270deg,
                    rgb(45, 137, 239),
                    rgb(110, 198, 255),
                    rgb(0, 180, 255));
            background-size: 600% 600%;
            animation: gradientMove 10s ease infinite;

            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        /* ANIMASI BACKGROUND */
        @keyframes gradientMove {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* BOX LOGIN */
        .login-box {
            width: 320px;
            padding: 25px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
            animation: fadeIn 0.6s ease;
            backdrop-filter: blur(5px);
        }

        h3 {
            margin-bottom: 15px;
        }

        /* INPUT GROUP */
        .input-group {
            position: relative;
            margin-bottom: 15px;
        }

        /* INPUT */
        input {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: rgb(45, 137, 239);
            box-shadow: 0 0 5px rgba(45, 137, 239, 0.5);
        }

        input.error {
            border-color: red;
        }

        /* ERROR TEXT */
        .error-text {
            color: red;
            font-size: 12px;
            text-align: left;
            margin-top: 3px;
            display: block;
        }

        /* PASSWORD TOGGLE */
        .password-box .toggle {
            position: absolute;
            right: 10px;
            top: 10px;
            cursor: pointer;
            font-size: 14px;
        }

        /* BUTTON */
        button {
            padding: 10px;
            width: 100%;
            background: rgb(45, 137, 239);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: rgb(27, 95, 189);
            transform: scale(1.03);
        }

        /* SPINNER */
        #globalLoading {
            display: none;
            position: fixed;
            z-index: 9999;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            align-items: center;
            justify-content: center;
        }

        .spinner {
            width: 45px;
            height: 45px;
            border: 5px solid #ccc;
            border-top: 5px solid rgb(45, 137, 239);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: auto;
        }

        /* ANIMASI SPINNER */
        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        /* FADE IN */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* SHAKE ERROR */
        @keyframes shake {
            0% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-5px);
            }

            50% {
                transform: translateX(5px);
            }

            75% {
                transform: translateX(-5px);
            }

            100% {
                transform: translateX(0);
            }
        }

        .shake {
            animation: shake 0.3s;
        }
    </style>
</head>

<body>

    <div class="login-box" id="loginBox">
        <h3>🔐 LOGIN SISTEM PPAT</h3>

        <!-- EMAIL -->
        <div class="input-group">
            <input type="email" id="email" placeholder="Email">
            <small id="emailError" class="error-text"></small>
        </div>

        <!-- PASSWORD -->
        <div class="input-group password-box">
            <input type="password" id="password" placeholder="Password">
            <span class="toggle" onclick="togglePass()">👁️</span>
            <small id="passError" class="error-text"></small>
        </div>

        <button onclick="login()">Login</button>
    </div>

    <!-- SPINNER -->
    <div id="globalLoading">
        <div style="text-align:center; color:white;">
            <div class="spinner"></div>
            <div style="margin-top:10px;">Memproses login...</div>
        </div>
    </div>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycbzowWO-hNgGMr3UDA-9Nn4z8_4HfhIDGGVLc_bG9_eNyCieTzQxzR_MKcIdLJzjOpUg/exec";
        // auto redirect
        window.onload = function () {
            const token = localStorage.getItem("token");
            if (token) {
                window.location.href = "Table.html";
            }
        };

        // toggle password
        function togglePass() {
            const pass = document.getElementById("password");
            pass.type = pass.type === "password" ? "text" : "password";
        }

        // validasi email
        function validasiEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        // enter = login
        document.addEventListener("keypress", function (e) {
            if (e.key === "Enter") login();
        });

        function login() {
            const email = document.getElementById("email");
            const password = document.getElementById("password");
            const emailError = document.getElementById("emailError");
            const passError = document.getElementById("passError");
            const box = document.getElementById("loginBox");

            let valid = true;

            // reset
            email.classList.remove("error");
            password.classList.remove("error");
            emailError.innerText = "";
            passError.innerText = "";

            // validasi email
            if (!email.value.trim()) {
                emailError.innerText = "Email wajib diisi";
                email.classList.add("error");
                valid = false;
            } else if (!validasiEmail(email.value)) {
                emailError.innerText = "Format email tidak valid";
                email.classList.add("error");
                valid = false;
            }

            // validasi password
            if (!password.value.trim()) {
                passError.innerText = "Password wajib diisi";
                password.classList.add("error");
                valid = false;
            }

            if (!valid) return;

            document.getElementById("globalLoading").style.display = "flex";

            fetch(`${URL}?action=login&email=${encodeURIComponent(email.value)}&password=${encodeURIComponent(password.value)}`)
                .then(res => res.json())
                .then(res => {
                    if (res.status === "success") {
                        localStorage.setItem("token", res.token);
                        window.location.href = "dashboard.html";
                    } else {
                        passError.innerText = "Email atau password salah";
                        password.classList.add("error");

                        // animasi shake
                        box.classList.add("shake");
                        setTimeout(() => box.classList.remove("shake"), 300);
                    }
                })
                .catch(() => {
                    alert("Koneksi gagal!");
                })
                .finally(() => {
                    document.getElementById("globalLoading").style.display = "none";
                });
        }

        // ===============================
        // ANTI INSPECT (BASIC PROTECTION)
        // ===============================

        // blok klik kanan
        document.addEventListener("contextmenu", function (e) {
            e.preventDefault();
        });

        // blok shortcut inspect
        document.addEventListener("keydown", function (e) {

            // F12
            if (e.key === "F12") {
                e.preventDefault();
            }

            // Ctrl+Shift+I / Ctrl+Shift+J
            if (e.ctrlKey && e.shiftKey && (e.key === "I" || e.key === "J")) {
                e.preventDefault();
            }

            // Ctrl+U (view source)
            if (e.ctrlKey && e.key === "u") {
                e.preventDefault();
            }
        });
    </script>

</body>

</html>
