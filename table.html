<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Login Modern | PPAT System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', system-ui, -apple-system, sans-serif;

            /* Gradient background animasi yang lebih smooth & modern */
            background: linear-gradient(135deg,
                    #0f0c29,
                    #302b63,
                    #24243e,
                    #1a1a2e,
                    #16213e);
            background-size: 400% 400%;
            animation: gradientFlow 12s ease infinite;

            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            position: relative;
            overflow: hidden;
        }

        /* Efek partikel/bubble background */
        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle at 10% 20%, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        @keyframes gradientFlow {
            0% {
                background-position: 0% 0%;
            }

            25% {
                background-position: 100% 50%;
            }

            50% {
                background-position: 100% 100%;
            }

            75% {
                background-position: 0% 50%;
            }

            100% {
                background-position: 0% 0%;
            }
        }

        /* GLASSMORPHISM BOX - Modern & Elegant */
        .login-box {
            width: 380px;
            padding: 40px 35px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            border-radius: 28px;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3),
                0 0 0 1px rgba(255, 255, 255, 0.1) inset;
            animation: fadeInUp 0.8s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .login-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 35px 55px rgba(0, 0, 0, 0.4);
        }

        /* Judul modern dengan icon */
        h3 {
            font-size: 1.9rem;
            font-weight: 600;
            margin-bottom: 28px;
            background: linear-gradient(135deg, #fff, #a0c4ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        h3 {
            font-size: 1.9rem;
            font-weight: 600;
            margin-bottom: 28px;
            background: linear-gradient(135deg, #fff, #a0c4ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        h3::before {
            content: '⚡';
            font-size: 1.8rem;
            background: none;
            color: #ffd966;
            -webkit-background-clip: unset;
            /* ← HAPUS BARIS INI */
            background-clip: unset;
            /* ← TAMBAHKAN INI untuk konsistensi */
        }

        /* Input group modern */
        .input-group {
            position: relative;
            margin-bottom: 22px;
            text-align: left;
        }

        /* Label floating modern */
        .input-group label {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.85rem;
            pointer-events: none;
            transition: 0.2s ease;
            background: transparent;
            padding: 0 5px;
        }

        /* Input field dengan efek neon */
        input {
            width: 100%;
            padding: 14px 16px;
            font-size: 0.95rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            border-radius: 18px;
            outline: none;
            color: white;
            font-weight: 500;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        input:focus {
            border-color: #4facfe;
            box-shadow: 0 0 15px rgba(79, 172, 254, 0.4);
            background: rgba(255, 255, 255, 0.15);
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.5);
            font-weight: 400;
        }

        input.error {
            border-color: #ff4d4d;
            animation: shake 0.4s ease;
            box-shadow: 0 0 8px rgba(255, 77, 77, 0.6);
        }

        /* Custom group email dengan badge modern */
        .email-group {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            padding: 0 8px;
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            transition: 0.3s;
        }

        .email-group:focus-within {
            border-color: #4facfe;
            box-shadow: 0 0 12px rgba(79, 172, 254, 0.3);
        }

        .email-group input {
            border: none;
            padding: 14px 0 14px 8px;
            background: transparent;
            flex: 1;
        }

        .email-group input:focus {
            box-shadow: none;
        }

        .email-badge {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #1a1a2e;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        /* Password toggle modern */
        .password-box {
            position: relative;
        }

        .toggle {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.7);
            transition: 0.2s;
            background: rgba(0, 0, 0, 0.2);
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .toggle:hover {
            color: white;
            background: rgba(255, 255, 255, 0.2);
        }

        /* Error text modern */
        .error-text {
            color: #ffb3b3;
            font-size: 0.7rem;
            margin-top: 6px;
            margin-left: 12px;
            display: block;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        /* Button futuristic */
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, #4facfe, #00f2fe);
            border: none;
            border-radius: 40px;
            color: #1a1a2e;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 12px;
            box-shadow: 0 5px 15px rgba(79, 172, 254, 0.3);
            letter-spacing: 0.5px;
        }

        button:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 25px rgba(79, 172, 254, 0.5);
            background: linear-gradient(90deg, #3b9eff, #00e0fe);
            color: #0a0a1a;
        }

        button:active {
            transform: scale(0.98);
        }

        /* Spinner modern */
        #globalLoading {
            display: none;
            position: fixed;
            z-index: 9999;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .spinner {
            width: 55px;
            height: 55px;
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-top: 4px solid #4facfe;
            border-right: 4px solid #00f2fe;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            box-shadow: 0 0 15px rgba(79, 172, 254, 0.5);
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            margin-top: 16px;
            color: white;
            font-weight: 500;
            letter-spacing: 1px;
            font-size: 0.9rem;
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            20% {
                transform: translateX(-6px);
            }

            40% {
                transform: translateX(6px);
            }

            60% {
                transform: translateX(-3px);
            }

            80% {
                transform: translateX(3px);
            }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-box {
                width: 90%;
                padding: 30px 20px;
            }

            h3 {
                font-size: 1.5rem;
            }

            .email-badge {
                font-size: 0.7rem;
                padding: 4px 10px;
            }
        }

        /* floating shapes */
        .floating-shape {
            position: absolute;
            background: radial-gradient(circle, rgba(79, 172, 254, 0.2), transparent);
            border-radius: 50%;
            filter: blur(60px);
            z-index: -1;
        }
    </style>
</head>

<body>
    <div class="floating-shape" style="width: 300px; height: 300px; top: -100px; left: -100px;"></div>
    <div class="floating-shape"
        style="width: 400px; height: 400px; bottom: -150px; right: -100px; background: radial-gradient(circle, rgba(0,242,254,0.15), transparent);">
    </div>

    <div class="login-box" id="loginBox">
        <h3>LOGIN PPAT</h3>

        <!-- EMAIL dengan style modern -->
        <div class="input-group">
            <div class="email-group">
                <input type="text" id="emailName" placeholder="username" autocomplete="off">
                <span class="email-badge">@mail.com</span>
            </div>
            <small id="emailError" class="error-text"></small>
        </div>

        <!-- PASSWORD modern -->
        <div class="input-group password-box">
            <input type="password" id="password" placeholder="Kata Sandi">
            <span class="toggle" onclick="togglePass()">👁️</span>
            <small id="passError" class="error-text"></small>
        </div>

        <button onclick="login()">➤ MASUK</button>
    </div>

    <!-- LOADING MODERN -->
    <div id="globalLoading">
        <div class="spinner"></div>
        <div class="loading-text">Memverifikasi kredensial...</div>
    </div>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycbzowWO-hNgGMr3UDA-9Nn4z8_4HfhIDGGVLc_bG9_eNyCieTzQxzR_MKcIdLJzjOpUg/exec";

        window.onload = function () {
            const token = localStorage.getItem("token");
            if (token) {
                window.location.href = "dashbord.html";
            }
            // efek modern: focus awal
            document.getElementById("emailName").focus();
        };

        function togglePass() {
            const pass = document.getElementById("password");
            const type = pass.type === "password" ? "text" : "password";
            pass.type = type;
            const toggleIcon = document.querySelector(".toggle");
            toggleIcon.textContent = type === "password" ? "👁️" : "🙈";
        }

        function validasiNama(nama) {
            return /^[a-zA-Z0-9._-]+$/.test(nama);
        }

        document.addEventListener("keypress", function (e) {
            if (e.key === "Enter") login();
        });

        function login() {
            const nameInput = document.getElementById("emailName");
            const passwordInput = document.getElementById("password");
            const emailError = document.getElementById("emailError");
            const passError = document.getElementById("passError");
            const box = document.getElementById("loginBox");

            // Reset error visual
            nameInput.classList.remove("error");
            passwordInput.classList.remove("error");
            emailError.innerText = "";
            passError.innerText = "";

            let valid = true;
            const nameVal = nameInput.value.trim();

            if (!nameVal) {
                emailError.innerText = "✖ Nama pengguna wajib diisi";
                nameInput.classList.add("error");
                valid = false;
            } else if (!validasiNama(nameVal)) {
                emailError.innerText = "✖ Hanya huruf, angka, titik, underscore atau strip";
                nameInput.classList.add("error");
                valid = false;
            }

            if (!valid) {
                box.classList.add("shake");
                setTimeout(() => box.classList.remove("shake"), 400);
                return;
            }

            const fullEmail = nameVal + "@mail.com";
            const password = passwordInput.value;

            document.getElementById("globalLoading").style.display = "flex";

            fetch(`${URL}?action=login&email=${encodeURIComponent(fullEmail)}&password=${encodeURIComponent(password)}`)
                .then(res => res.json())
                .then(res => {
                    if (res.status === "success") {
                        localStorage.setItem("token", res.token);
                        window.location.href = "dashbord.html";
                    } else {
                        passError.innerText = "⚠ Email atau kata sandi salah";
                        passwordInput.classList.add("error");
                        box.classList.add("shake");
                        setTimeout(() => box.classList.remove("shake"), 400);
                    }
                })
                .catch(() => {
                    passError.innerText = "❌ Gagal terhubung ke server";
                    passwordInput.classList.add("error");
                    box.classList.add("shake");
                    setTimeout(() => box.classList.remove("shake"), 400);
                })
                .finally(() => {
                    document.getElementById("globalLoading").style.display = "none";
                });
        }

        // Proteksi klik kanan (tetap dipertahankan)
        document.addEventListener("contextmenu", function (e) {
            e.preventDefault();
        });
    </script>
</body>

</html>
