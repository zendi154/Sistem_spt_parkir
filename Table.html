<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <title>Notifikasi PPAT</title>

    <style>
        /* =========================
            GLOBAL
        ========================= */
        body {
            font-family: 'Work Sans', sans-serif;
            background: linear-gradient(135deg, #eef2f7, #dfe9f3);
            padding: 80px 20px 20px 20px;
        }

        h2 {
            font-weight: 700;
            margin-bottom: 20px;
            color: #2c3e50;
        }

        /* =========================
       NAVBAR
        ========================= */
        #mainNavbar {
            background: linear-gradient(90deg, #2c3e50, #4ca1af);
        }

        .navbar-brand {
            font-weight: 600;
            color: white !important;
        }

        .nav-link {
            color: white !important;
            margin-left: 15px;
            font-weight: 500;
            transition: 0.3s;
        }

        .nav-link:hover {
            opacity: 0.8;
        }

        /* =========================
       BOX / CARD
        ========================= */
        .card-box,
        .action-box {
            background: white;
            padding: 18px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            margin-bottom: 20px;
        }

        /* =========================
       FORM
    ========================= */
        select {
            border-radius: 8px;
            border: 1px solid #ddd;
            padding: 7px 10px;
            min-width: 250px;
        }

        select:focus {
            border-color: #4ca1af;
            box-shadow: 0 0 5px rgba(76, 161, 175, 0.4);
            outline: none;
        }

        /* =========================
       BUTTON
    ========================= */
        button {
            border-radius: 8px;
            padding: 7px 12px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            transition: 0.25s;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.12);
        }

        button i {
            margin-right: 5px;
            font-size: 13px;
        }

        .kirim {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
        }

        .massal {
            background: linear-gradient(135deg, #e74c3c, #ff6b6b);
            color: white;
        }

        .preview {
            background: linear-gradient(135deg, #3498db, #5dade2);
            color: white;
        }

        /* =========================
       TABLE
    ========================= */
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            font-size: 13px;
        }

        /* HEADER */
        thead {
            background: linear-gradient(90deg, #2c3e50, #4ca1af);
            color: white;
        }

        thead th {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            padding: 10px 8px;
            text-align: center;
            white-space: nowrap;
            /* 🔥 BIAR TIDAK TURUN */
        }

        /* ICON HEADER */
        thead i {
            margin-right: 4px;
            font-size: 12px;
        }

        /* CELL */
        th,
        td {
            padding: 8px 8px;
            vertical-align: middle;
            /* 🔥 KUNCI SEJAJAR */
        }

        /* TEXT CONTROL */
        td {
            line-height: 1.4;
        }

        /* KHUSUS KOLOM PANJANG */
        td:nth-child(3),
        td:nth-child(4) {
            white-space: normal;
        }

        /* KOLOM LAIN JANGAN TURUN */
        td:not(:nth-child(3)):not(:nth-child(4)) {
            white-space: nowrap;
        }

        /* CENTER KOLOM TERTENTU */
        td:nth-child(1),
        td:nth-child(5),
        td:nth-child(6),
        td:nth-child(8),
        td:nth-child(9),
        td:nth-child(10) {
            text-align: center;
        }

        /* ROW EFFECT */
        tbody tr {
            transition: 0.2s;
        }

        tbody tr:hover {
            background: #f5f9ff;
        }

        tbody tr:nth-child(even) {
            background: #fafafa;
        }

        /* =========================
       EMAIL BADGE
    ========================= */
        .email-badge {
            background: linear-gradient(135deg, #e3f2fd, #bbdefb);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
        }

        /* =========================
       STATUS
    ========================= */
        .status {
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .status-terkirim {
            background: #d4edda;
            color: #155724;
        }

        .status-belum {
            background: #fff3cd;
            color: #856404;
        }

        /* =========================
       BUTTON DALAM TABLE
    ========================= */
        table button {
            padding: 5px 8px;
            font-size: 12px;
        }

        /* =========================
       RESPONSIVE
    ========================= */
        @media (max-width: 768px) {
            table {
                font-size: 12px;
            }

            select {
                width: 100%;
                margin-bottom: 10px;
            }
        }
    </style>

</head>

<body>

    <h2>SURAT PEMBERITAHUAN</h2>

    <!-- Navbar -->
    <nav id="mainNavbar" class="navbar fixed-top shadow-sm py-2">
        <div class="container d-flex justify-content-between align-items-center">
            <!-- Judul -->
            <a class="navbar-brand d-flex align-items-center" href="#">
                <i class="bi bi-envelope">KIRIM EMAIL OTOMATIS</i>
            </a>

            <!-- Menu Navigasi -->
            <div class="nav-links d-flex align-items-center">
                <a href="dashbord.html" class="nav-link" title="Formulir PPAT">
                    <i class="bi bi-buildings"></i> Dashbord
                </a>
                <a href="fomulir.html" class="nav-link" title="Formulir PPAT">
                    <i class="bi bi-file-earmark-text me-1"></i> Formulir PPAT
                </a>
                <a href="datajukir.html" class="nav-link" title="Formulir PPAT">
                    <i class="bi bi-send"> Arsip Surat</i>
                </a>
                <a href="table.html" class="nav-link" onclick="logout()" title="Logout">
                    <i class="bi bi-box-arrow-right me-1"></i> LOGOUT
                </a>
            </div>
        </div>
    </nav>

    <div class="action-box">

        <div class="d-flex flex-wrap gap-2 mt-3">

            <!-- FILTER BULAN -->
            <select id="filterBulan" class="form-select custom-select">
                <option value="">Semua Bulan</option>
                <option>Januari</option>
                <option>Februari</option>
                <option>Maret</option>
                <option>April</option>
                <option>Mei</option>
                <option>Juni</option>
                <option>Juli</option>
                <option>Agustus</option>
                <option>September</option>
                <option>Oktober</option>
                <option>November</option>
                <option>Desember</option>
            </select>

            <!-- CARI NAMA -->
            <input type="text" id="searchNama" class="form-control" placeholder="🔍 Cari nama PPAT..."
                style="max-width:250px;">

        </div>

        <div class="d-flex flex-wrap gap-2 align-items-center mb-3">
            <select id="notaris" class="form-select custom-select"></select>

            <button class="btn btn-primary" onclick="tambahNotaris()">
                <i class="bi bi-person-plus-fill"></i> Tambah Manual
            </button>
        </div>

        <div class="d-flex flex-wrap gap-2">
            <button class="btn btn-warning" onclick="generateData()">
                <i class="bi bi-calendar-plus"></i> Generate Data/Tarik Semua
            </button>

            <button class="btn btn-danger" onclick="kirimMassal()">
                <i class="bi bi-send-check-fill"></i> Kirim Semua
            </button>
        </div>

    </div>

    <table>
        <thead class="table-dark">
            <tr>
                <th><i class="bi bi-hash"></i></th>
                <th><i class="bi bi-person-badge"></i> Nomor Unik</th>
                <th><i class="bi bi-person-fill"></i> Nama </th>
                <th><i class="bi bi-geo-alt-fill"></i> Alamat Kantor</th>
                <th><i class="bi bi-calendar-month"></i> Periode Bulan</th>
                <th><i class="bi bi-file-earmark-text"></i> Nomor Surat</th>
                <th><i class="bi bi-envelope-fill"></i> Email Aktif</th>
                <th><i class="bi bi-check-circle-fill"></i> Status</th>
                <th><i class="bi bi-eye-fill"></i> Arsip</th>
                <th><i class="bi bi-gear-fill"></i> Aksi</th>
            </tr>
        </thead>

        <tbody id="data"></tbody>
    </table>

    <!-- Tambahkan SweetAlert2 CDN di <head> -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycbwRoiwRJo9bgYeN7AoPuaoARfeGT3LLw9HEpZB-sXiXsvR7B_dcJLlPj6NSHX0KEYL03g/exec";

        /* =========================
           SHOW LOADING
        ========================= */
        function showLoading(msg = "Loading...") {
            Swal.fire({
                title: msg,
                allowOutsideClick: false,
                didOpen: () => Swal.showLoading()
            });
        }

        /* =========================
           HIDE LOADING
        ========================= */
        function hideLoading() {
            Swal.close();
        }

        /* =========================
           LOAD DATA
        ========================= */
        async function load() {
            showLoading("Memuat data...");
            try {
                const res = await fetch(URL + "?action=get");
                const d = await res.json();

                const filterBulan = (document.getElementById("filterBulan")?.value || "").toLowerCase().trim();
                const searchNama = (document.getElementById("searchNama")?.value || "").toLowerCase().trim();

                let html = "";

                d.forEach(x => {
                    let nama = (x.nama || "").toLowerCase();
                    let bulanData = (x.bulan || "").toString().toLowerCase().trim();

                    if (filterBulan && bulanData !== filterBulan) return;
                    if (searchNama && !nama.includes(searchNama)) return;

                    html += `
                <tr>
                    <td>${x.no || "-"}</td>
                    <td>${x.id || "-"}</td>
                    <td>${x.nama || "-"}</td>
                    <td>${x.alamat || "-"}</td>
                    <td>${x.bulan || "-"}</td>
                    <td>${x.nomor || "-"}</td>
                    <td>
                        ${x.email
                            ? `<a href="mailto:${x.email}" class="email-badge">${x.email}</a>`
                            : `<span style="color:#aaa;">Tidak ada email</span>`}
                    </td>
                    <td>
                        <span class="status ${x.status === 'TERKIRIM' ? 'status-terkirim' : 'status-belum'}">
                            ${x.status || "BELUM"}
                        </span>
                    </td>
                    <td style="text-align:center;">
                        ${x.nomor
                            ? `<button class="preview" onclick="lihat('${x.nomor}')"><i class="bi bi-eye-fill"></i></button>`
                            : `<button disabled class="btn-secondary"><i class="bi bi-eye-slash"></i></button>`}
                    </td>
                    <td>
                        ${x.status === "TERKIRIM"
                            ? `<button class="kirim" disabled><i class="bi bi-check-circle-fill"></i> Terkirim</button>`
                            : `<button class="kirim" onclick="kirim(${x.row})"><i class="bi bi-send-fill"></i> Kirim Manual</button>`}
                    </td>
                </tr>`;
                });

                if (html === "") {
                    html = `
                <tr>
                    <td colspan="10" style="text-align:center; padding:20px; color:#888;">
                        <i class="bi bi-exclamation-circle"></i> Data tidak ditemukan
                    </td>
                </tr>`;
                }

                document.getElementById("data").innerHTML = html;
            } catch (err) {
                console.error(err);
                document.getElementById("data").innerHTML = `
                <tr>
                    <td colspan="10" style="text-align:center; color:red;">
                        Gagal load data
                    </td>
                </tr>`;
            } finally {
                hideLoading();
            }
        }

        /* =========================
           TAMBAH NOTARIS
        ========================= */
        async function tambahNotaris() {
            const select = document.getElementById("notaris");
            const opt = select.options[select.selectedIndex];

            if (!opt.value) {
                Swal.fire("Pilih notaris dulu!", "", "warning");
                return;
            }

            const data = {
                nama: opt.value,
                id: opt.getAttribute("data-id"),
                alamat: opt.getAttribute("data-alamat"),
                email: opt.getAttribute("data-email") || "" // email bisa kosong
            };

            try {
                showLoading("Menambahkan notaris...");
                const res = await fetch(URL + "?action=tambah", {
                    method: "POST",
                    body: JSON.stringify(data)
                });
                const text = await res.text();
                hideLoading();
                Swal.fire("Berhasil!", "Notaris berhasil ditambahkan", "success");
                load();
            } catch (err) {
                console.error(err);
                hideLoading();
                Swal.fire("Gagal!", "Tidak dapat menambahkan data", "error");
            }
        }

        /* =========================
       LOADING MODERN
    ========================= */
        function showLoading(message = "Memuat data...") {
            Swal.fire({
                title: message,
                didOpen: () => {
                    Swal.showLoading();
                },
                allowOutsideClick: false,
                allowEscapeKey: false,
                showConfirmButton: false,
                showCloseButton: false
            });
        }

        function hideLoading() {
            Swal.close();
        }

        /* =========================
           GENERATE DATA BULANAN
        ========================= */
        async function generateData() {
            const result = await Swal.fire({
                title: "Generate data bulan ini?",
                icon: "question",
                showCancelButton: true,
                confirmButtonText: "Ya, generate",
                cancelButtonText: "Batal"
            });

            if (!result.isConfirmed) return;

            try {
                showLoading("Sedang generate data...");

                const res = await fetch(URL + "?action=generate");
                const text = await res.text(); // misal: "0 data ditambahkan"

                hideLoading();

                if (text.startsWith("0")) {
                    // ❌ Alert merah jika data tidak ditambahkan
                    Swal.fire({
                        title: "Gagal",
                        text: "Maaf, beberapa notaris belum punya email sehingga data tidak bisa ditambahkan",
                        icon: "error",
                        confirmButtonText: "Tutup"
                    });
                } else {
                    // ✅ Alert hijau jika ada data ditambahkan
                    Swal.fire({
                        title: "Selesai",
                        text: text,
                        icon: "success",
                        confirmButtonText: "Tutup"
                    });
                }

                // Reload tabel setelah generate
                load();

            } catch (err) {
                console.error(err);
                hideLoading();
                Swal.fire({
                    title: "Gagal",
                    text: "Terjadi kesalahan saat generate data",
                    icon: "error",
                    confirmButtonText: "Tutup"
                });
            }
        }

        /* =========================
           LIHAT NOMOR
        ========================= */
        function lihat(nomor) {
            window.open(URL + "?action=cek&nomor=" + encodeURIComponent(nomor), "_blank");
        }

        /* =========================
           KIRIM EMAIL
        ========================= */
        async function kirim(row) {
            try {
                showLoading("Mengirim email...");
                const res = await fetch(URL + "?action=kirim&row=" + row);
                const text = await res.text();
                hideLoading();
                Swal.fire("Sukses!", "Email berhasil dikirim", "success");
                load();
            } catch (err) {
                console.error(err);
                hideLoading();
                Swal.fire("Gagal!", "Tidak dapat mengirim email", "error");
            }
        }

        /* =========================
           KIRIM MASSAL
        ========================= */
        async function kirimMassal() {
            const result = await Swal.fire({
                title: "Kirim semua email?",
                icon: "question",
                showCancelButton: true,
                confirmButtonText: "Ya, kirim",
                cancelButtonText: "Batal"
            });

            if (!result.isConfirmed) return;

            try {
                showLoading("Mengirim semua email...");
                await fetch(URL + "?action=massal");
                hideLoading();
                Swal.fire("Selesai!", "Semua email berhasil dikirim", "success");
                load();
            } catch (err) {
                console.error(err);
                hideLoading();
                Swal.fire("Gagal!", "Tidak bisa mengirim email", "error");
            }
        }

        /* =========================
           LOAD NOTARIS UNTUK SELECT
        ========================= */
        async function loadNotaris() {
            try {
                const res = await fetch(URL + "?action=notaris");
                const data = await res.json();
                let html = '<option value="">-- Pilih Notaris --</option>';
                data.forEach(n => {
                    html += `<option value="${n.nama}" data-id="${n.id}" data-alamat="${n.alamat}" data-email="${n.email || ''}">${n.nama}</option>`;
                });
                document.getElementById("notaris").innerHTML = html;
            } catch (err) {
                console.error(err);
            }
        }

        // INITIAL LOAD
        loadNotaris();
        load();

        /* =========================
                       FUNGSI LOGIN DAN LOGOUT
                    ========================= */
        function cekLogin() {
            const token = localStorage.getItem("token");

            // Jika token tidak ada, redirect ke table.html
            if (!token) {
                console.warn("Token tidak ditemukan, redirect ke table.html");
                window.location.href = "table.html";
                return;
            }

            // Cek token ke server langsung tanpa const URL
            fetch("https://script.google.com/macros/s/AKfycbzowWO-hNgGMr3UDA-9Nn4z8_4HfhIDGGVLc_bG9_eNyCieTzQxzR_MKcIdLJzjOpUg/exec?action=check&token=" + encodeURIComponent(token))
                .then(res => {
                    if (!res.ok) throw new Error("Response tidak OK");
                    return res.json();
                })
                .then(data => {
                    if (data.status !== "valid") {
                        console.warn("Token tidak valid, hapus dan redirect");
                        localStorage.removeItem("token");
                        window.location.href = "table.html";
                    } else {
                        console.log("Token valid, akses diterima");
                    }
                })
                .catch(err => {
                    console.error("Terjadi error saat cek login:", err);
                    window.location.href = "table.html";
                });
        }

        // blok klik kanan
        document.addEventListener("contextmenu", function (e) {
            e.preventDefault();
        });
    </script>

</body>

</html>
