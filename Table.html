            GLOBAL
        ========================= */

        /* =========================

        ========================= */

        }

            margin-left: 15px;
            font-weight: 500;
            transition: 0.3s;
        }

        .nav-link:hover {
            opacity: 0.8;
        }

        /* =========================
       BOX / CARD
        ========================= */
        .card-box,
        .action-box {
            background: white;
            padding: 18px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            margin-bottom: 20px;
        }

        /* =========================
       FORM
    ========================= */
        select {
            border-radius: 8px;
            border: 1px solid #ddd;
            padding: 7px 10px;
            min-width: 250px;
        }

        select:focus {
            border-color: #4ca1af;
            box-shadow: 0 0 5px rgba(76, 161, 175, 0.4);
            outline: none;
        }

        /* =========================
       BUTTON
    ========================= */
        button {

            padding: 7px 12px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            transition: 0.25s;
        }

        button:hover {

        }

        .preview {
            background: linear-gradient(135deg, #3498db, #5dade2);
            color: white;
        }

        /* =========================
       TABLE
    ========================= */
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            font-size: 13px;
        }

        /* HEADER */
        thead {
            background: linear-gradient(90deg, #2c3e50, #4ca1af);
            color: white;
        }

            font-size: 12px;
            text-transform: uppercase;

            padding: 10px 8px;
            text-align: center;
            white-space: nowrap;
            /* 🔥 BIAR TIDAK TURUN */
        }

        /* ICON HEADER */
        thead i {
            margin-right: 4px;
            font-size: 12px;
        }

        /* CELL */
        th,

            vertical-align: middle;

        }

        /* TEXT CONTROL */
        td {
            line-height: 1.4;
        }

        /* KHUSUS KOLOM PANJANG */
        td:nth-child(3),
        td:nth-child(4) {
            white-space: normal;
        }

        /* KOLOM LAIN JANGAN TURUN */
        td:not(:nth-child(3)):not(:nth-child(4)) {
            white-space: nowrap;
        }

        /* CENTER KOLOM TERTENTU */

        td:nth-child(5),
        td:nth-child(6),
        td:nth-child(8),
        td:nth-child(9),
        td:nth-child(10) {

        }

        tbody tr {
            transition: 0.2s;

            background: #f5f9ff;
        }

        tbody tr:nth-child(even) {

        }

           EMAIL BADGE
        ========================= */

            border-radius: 20px;
            font-size: 12px;
        }

        /* =========================
           SEARCH 
         ========================= */

        .search-wrapper {

        }

            display: flex;

        .search-icon {

        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(239, 68, 68, 0.4);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #64748b 0%, #475569 100%);
            color: white;
            box-shadow: 0 2px 8px rgba(100, 116, 139, 0.3);
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(100, 116, 139, 0.4);
        }

        .btn-action:active {
            transform: translateY(1px);

            }

        ========================= */

            }

    <!-- Tambahkan SweetAlert2 CDN di <head> -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        /* =========================
           FUNGSI LOGIN DAN LOGOUT
        ========================= */
        function cekLogin() {
            const token = localStorage.getItem("token");

            // Jika token tidak ada, redirect ke table.html
            if (!token) {
                console.warn("Token tidak ditemukan, redirect ke table.html");
                window.location.href = "table.html";
                return;
            }

            // Cek token ke server langsung tanpa const URL
            fetch("https://script.google.com/macros/s/AKfycbzowWO-hNgGMr3UDA-9Nn4z8_4HfhIDGGVLc_bG9_eNyCieTzQxzR_MKcIdLJzjOpUg/exec?action=check&token=" + encodeURIComponent(token))
                .then(res => {
                    if (!res.ok) throw new Error("Response tidak OK");
                    return res.json();
                })
                .then(data => {
                    if (data.status !== "valid") {
                        console.warn("Token tidak valid, hapus dan redirect");
                        localStorage.removeItem("token");
                        window.location.href = "table.html";
                    } else {
                        console.log("Token valid, akses diterima");
                    }
                })
                .catch(err => {
                    console.error("Terjadi error saat cek login:", err);
                    window.location.href = "table.html";
                });
        }

        const URL = "https://script.google.com/macros/s/AKfycbwJodXVtdJx49B5KFysyPIaQUDTVnE3zUbKtQdluXl0Kt6MlRzrCv3knobtLC0X3lVYcg/exec";

        /* =========================
           SHOW LOADING MODERN
        ========================= */
        function showLoading(message = "Mohon Tunggu<br>Memuat data...") {
            Swal.fire({
                title: message,
                allowOutsideClick: false,
                allowEscapeKey: false,
                showConfirmButton: false,
                showCloseButton: false,
                didOpen: () => {
                    Swal.showLoading();
                }
            });
        }

        /* =========================
           HIDE LOADING
        ========================= */
        function hideLoading() {
            Swal.close();
        }


        /* =========================
           LOAD DATA 
        ========================= */
        async function load() {
            showLoading("Memuat data...");
            try {
                const res = await fetch(URL + "?action=get");

                if (!res.ok) {
                    throw new Error(`HTTP ${res.status}: ${res.statusText}`);
                }

                const d = await res.json();

                // DEBUG: Lihat struktur data
                console.log("Data dari server:", d);
                if (d.length > 0) {
                    console.log("Keys yang tersedia:", Object.keys(d[0]));
                }

                const filterBulan = (document.getElementById("filterBulan")?.value || "").toLowerCase().trim();
                const searchNama = (document.getElementById("searchNama")?.value || "").toLowerCase().trim();

                let html = "";
                let no = 1;

                d.forEach(x => {
                    // SESUAIKAN DENGAN KEY DARI APPS SCRIPT
                    let id = x.id || "-";
                    let nama = (x.nama || "").toLowerCase();
                    let alamat = x.alamat || "-";
                    let bulan = x.bulan || "-";
                    let nomorSurat = x.nomor || "-";
                    let email = x.email || "";
                    let statusEmail = x.status || "";

                    // EKSTRAK NAMA BULAN (misal: "Januari" -> "januari")
                    let namaBulan = bulan.toLowerCase().trim();

                    // FILTER
                    if (filterBulan && namaBulan !== filterBulan) return;
                    if (searchNama && !nama.includes(searchNama)) return;

                    // Tentukan status tampilan
                    let statusText = "BELUM";
                    let statusClass = "status-belum";

                    if (statusEmail === "TERKIRIM") {
                        statusText = "TERKIRIM";
                        statusClass = "status-terkirim";
                    }

                    html += `
                <tr>
                    <td>${no++}</td>
                    <td>${id}</td>
                    <td>${x.nama || "-"}</td>
                    <td>${alamat}</td>
                    <td>${bulan}</td>
                    <td>${nomorSurat}</td>
                    <td>
                        ${email
                            ? `<a href="mailto:${email}" class="email-badge">${email}</a>`
                            : `<span style="color:#aaa;">Tidak ada email</span>`}
                    </td>
                    <td>
                        <span class="status ${statusClass}">
                            ${statusText}
                        </span>
                    </td>
                    <td style="text-align:center;">
                        ${x.nomor
                            ? `<button class="preview" onclick="lihat('${x.nomor}')"><i class="bi bi-eye-fill"></i></button>`
                            : `<button disabled class="btn-secondary"><i class="bi bi-eye-slash"></i></button>`}
                    </td>
                    <td>
                        ${statusEmail === "TERKIRIM"
                            ? `<button class="kirim" disabled><i class="bi bi-check-circle-fill"></i> Terkirim</button>`
                            : `<button class="kirim" onclick="kirimManual(${x.row})"><i class="bi bi-send-fill"></i> Kirim</button>`}
                    </td>
                </tr>
            `;
                });

                if (html === "") {
                    html = `
                <tr>
                    <td colspan="10" style="text-align:center; padding:20px; color:#888;">
                        <i class="bi bi-exclamation-circle"></i> Data tidak ditemukan
                    </td>
                </tr>
            `;
                }

                document.getElementById("data").innerHTML = html;

            } catch (err) {
                console.error("Error detail:", err);
                document.getElementById("data").innerHTML = `
            <tr>
                <td colspan="10" style="text-align:center; color:red;">
                    <i class="bi bi-exclamation-triangle-fill"></i> Gagal load data: ${err.message}
                </td>
            </tr>
        `;
            } finally {
                hideLoading();
            }
        }

        /* =========================
           INITIAL EVENT LISTENERS
        ========================= */
        function initEventListeners() {
            const filterBulan = document.getElementById("filterBulan");
            if (filterBulan) {
                filterBulan.addEventListener("change", () => load());
            }

            const searchNama = document.getElementById("searchNama");
            if (searchNama) {
                searchNama.addEventListener("keyup", () => load());
            }
        }

        // Panggil setelah DOM siap
        document.addEventListener("DOMContentLoaded", () => {
            loadNotaris();
            load();
            initEventListeners();
        });

        // Panggil setelah load selesai
        document.addEventListener("DOMContentLoaded", () => {
            loadNotaris();
            load();
            initEventListeners();
        });

        /* =========================
           TAMBAH NOTARIS
        ========================= */
        async function tambahNotaris() {
            const select = document.getElementById("notaris");
            const opt = select.options[select.selectedIndex];

            if (!opt.value) {
                Swal.fire("Pilih notaris dulu!", "", "warning");
                return;
            }

            const data = {
                nama: opt.value,
                id: opt.getAttribute("data-id"),
                alamat: opt.getAttribute("data-alamat"),
                email: opt.getAttribute("data-email") || "" // email bisa kosong
            };

            try {
                showLoading("Menambahkan notaris...");
                const res = await fetch(URL + "?action=tambah", {
                    method: "POST",
                    body: JSON.stringify(data)
                });
                const text = await res.text();
                hideLoading();
                Swal.fire("Berhasil!", "Notaris berhasil ditambahkan", "success");
                load();
            } catch (err) {
                console.error(err);
                hideLoading();
                Swal.fire("Gagal!", "Tidak dapat menambahkan data", "error");
            }
        }

        /* =========================
           GENERATE DATA BULANAN
        ========================= */
        async function generateData() {
            const result = await Swal.fire({
                title: "Generate data bulan ini?",
                icon: "question",
                showCancelButton: true,
                confirmButtonText: "Ya, generate",
                cancelButtonText: "Batal"
            });

            if (!result.isConfirmed) return;

            try {
                showLoading("Sedang generate data...");

                const res = await fetch(URL + "?action=generate");
                const text = await res.text(); // misal: "0 data ditambahkan"

                hideLoading();

                if (text.startsWith("0")) {
                    // ❌ Alert merah jika data tidak ditambahkan
                    Swal.fire({
                        title: "Gagal",
                        text: "Maaf, beberapa notaris belum punya email sehingga data tidak bisa ditambahkan",
                        icon: "error",
                        confirmButtonText: "Tutup"
                    });
                } else {
                    // ✅ Alert hijau jika ada data ditambahkan
                    Swal.fire({
                        title: "Selesai",
                        text: text,
                        icon: "success",
                        confirmButtonText: "Tutup"
                    });
                }

                // Reload tabel setelah generate
                load();

            } catch (err) {
                console.error(err);
                hideLoading();
                Swal.fire({
                    title: "Gagal",
                    text: "Terjadi kesalahan saat generate data",
                    icon: "error",
                    confirmButtonText: "Tutup"
                });
            }
        }

        /* =========================
           LIHAT NOMOR SURAT
        ========================= */
        function lihat(nomor) {
            window.open(URL + "?action=cek&nomor=" + encodeURIComponent(nomor), "_blank");
        }

        /* =========================
           KIRIM EMAIL MANUAL
        ========================= */
        async function kirimManual(row) {
            showLoading("Mengirim email...");

            try {
                const res = await fetch(URL + "?action=kirim&row=" + row);
                const text = await res.text();

                hideLoading();

                if (text === "OK") {
                    Swal.fire({
                        title: "Sukses!",
                        text: "Email berhasil dikirim",
                        icon: "success",
                        confirmButtonText: "Tutup"
                    });
                } else {
                    Swal.fire({
                        title: "Gagal!",
                        text: text,
                        icon: "error",
                        confirmButtonText: "Tutup"
                    });
                }

                load();

            } catch (err) {
                console.error(err);
                hideLoading();

                Swal.fire({
                    title: "Gagal!",
                    text: "Tidak dapat mengirim email",
                    icon: "error",
                    confirmButtonText: "Tutup"
                });
            }
        }

        /* =========================
           KIRIM MASSAL
        ========================= */
        async function kirimMassal() {
            const result = await Swal.fire({
                title: "Kirim semua email?",
                text: "Proses ini akan mengirim email ke semua notaris yang statusnya BELUM",
                icon: "question",
                showCancelButton: true,
                confirmButtonText: "Ya, kirim semua",
                cancelButtonText: "Batal"
            });

            if (!result.isConfirmed) return;

            showLoading("Mengirim email massal... Mohon tunggu");

            try {
                const res = await fetch(URL + "?action=massal");
                const text = await res.text();

                hideLoading();

                Swal.fire({
                    title: "Selesai!",
                    text: text,
                    icon: "success",
                    confirmButtonText: "Tutup"
                });

                load();

            } catch (err) {
                console.error(err);
                hideLoading();

                Swal.fire({
                    title: "Gagal!",
                    text: "Tidak bisa mengirim email massal",
                    icon: "error",
                    confirmButtonText: "Tutup"
                });
            }
        }

        /* =========================
           LOAD NOTARIS UNTUK SELECT
        ========================= */
        async function loadNotaris() {
            try {
                const res = await fetch(URL + "?action=notaris");
                const data = await res.json();
                let html = '<option value="">-- Pilih Notaris --</option>';
                data.forEach(n => {
                    html += `<option value="${n.nama}" data-id="${n.id}" data-alamat="${n.alamat}" data-email="${n.email || ''}">${n.nama}</option>`;
                });
                document.getElementById("notaris").innerHTML = html;
            } catch (err) {
                console.error(err);
            }
        }

        // INITIAL LOAD
        loadNotaris();
        load();

        /* =========================
       PRINT TABLE (HANYA SAMPAI STATUS)
    ========================= */
        function printTable() {
            // Ambil data dari tabel yang sedang tampil (sudah terfilter)
            const filterBulan = (document.getElementById("filterBulan")?.value || "");
            const searchNama = (document.getElementById("searchNama")?.value || "");

            // Ambil semua baris data dari tbody
            const rows = document.querySelectorAll("#data tr");

            if (rows.length === 0 || (rows.length === 1 && rows[0].innerText.includes("Data tidak ditemukan"))) {
                Swal.fire("Info", "Tidak ada data untuk dicetak", "info");
                return;
            }

            // Buat struktur HTML untuk print
            let printContent = `
                <!DOCTYPE html>
                <html>
                <head>
                    <meta charset="UTF-8">
                    <title>Laporan Data Notaris/PPAT</title>
                    <style>
                        body {
                            font-family: 'Times New Roman', Arial, sans-serif;
                            margin: 20px;
                            padding: 0;
                        }
                        h2 {
                            text-align: center;
                            margin-bottom: 10px;
                            color: #333;
                        }
                        .info-print {
                            text-align: center;
                            margin-bottom: 20px;
                            font-size: 12px;
                            color: #666;
                        }
                        table {
                            width: 100%;
                            border-collapse: collapse;
                            font-size: 11px;
                        }
                        th, td {
                            border: 1px solid #000;
                            padding: 8px;
                            text-align: left;
                            vertical-align: top;
                        }
                        th {
                            background-color: #f2f2f2;
                            font-weight: bold;
                            text-align: center;
                        }
                        .status-terkirim {
                            color: green;
                            font-weight: bold;
                        }
                        .status-belum {
                            color: red;
                            font-weight: bold;
                        }
                        .email-badge {
                            color: #0066cc;
                            text-decoration: none;
                        }
                        @media print {
                            body {
                                margin: 0;
                                padding: 10px;
                            }
                            .no-print {
                                display: none;
                            }
                            table {
                                page-break-inside: avoid;
                            }
                            tr {
                                page-break-inside: avoid;
                            }
                        }
                    </style>
                </head>
                <body>
                    <h2>SURAT PEMBERITAHUAN LAPORAN BULANAN NOTARIS/PPAT</h2>
                    <div class="info-print">
                        Dicetak pada: ${new Date().toLocaleString('id-ID')}<br>
                        ${filterBulan ? `Filter Bulan: ${filterBulan}` : "Semua Bulan"} | 
                        ${searchNama ? `Filter Nama: ${searchNama}` : "Semua Nama"}
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>No</th>
                                <th>Nomor Unik</th>
                                <th>Nama</th>
                                <th>Alamat Kantor</th>
                                <th>Periode Bulan</th>
                                <th>Nomor Surat</th>
                                <th>Email Aktif</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                                    `;

            // Looping setiap baris data (hanya sampai kolom Status)
            rows.forEach(row => {
                const cells = row.querySelectorAll("td");
                if (cells.length >= 8) {
                    printContent += `
                <tr>
                    <td style="text-align:center;">${cells[0]?.innerText || '-'}</td>
                    <td>${cells[1]?.innerText || '-'}</td>
                    <td>${cells[2]?.innerText || '-'}</td>
                    <td>${cells[3]?.innerText || '-'}</td>
                    <td style="text-align:center;">${cells[4]?.innerText || '-'}</td>
                    <td style="text-align:center;">${cells[5]?.innerText || '-'}</td>
                    <td>${cells[6]?.innerHTML || '-'}</td>
                    <td style="text-align:center;">${cells[7]?.innerHTML || '-'}</td>
                </tr>
                         `;
                }
            });

            printContent += `
                        </tbody>
                    </table>
                </body>
                </html>
                `;

            // Buka window baru untuk print
            const printWindow = window.open('', '_blank');
            printWindow.document.write(printContent);
            printWindow.document.close();
            printWindow.print();
        }

        // blok klik kanan
        document.addEventListener("contextmenu", function (e) {
            e.preventDefault();
        });
    </script>

</body>

</html>
