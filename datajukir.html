<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <title>Arsip Surat Masuk</title>

    <style>
        /* ================= GLOBAL ================= */
        body {
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top, #264a2c, #161821 70%);
            color: #e5e7eb;
            margin: 0;
            padding: 25px;
        }

        /* JUDUL */
        h2 {
            text-align: center;
            margin-bottom: 30px;
            font-weight: 700;
            letter-spacing: 1px;
            background: linear-gradient(90deg, #3b82f6, #22c55e);
            -webkit-text-fill-color: transparent;
        }

        /* ================= CONTAINER ================= */
        .container {
            max-width: 1200px;
            margin: auto;
            padding: 0 15px;
        }

        /* ================= CARD ================= */
        .card {
            background: rgba(15, 23, 42, 0.7);
            padding: 24px;
            border-radius: 18px;
            backdrop-filter: blur(14px);
            box-shadow:
                0 10px 40px rgba(0, 0, 0, 0.7),
                0 0 15px rgba(59, 130, 246, 0.15);
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        /* ================= FORM ================= */
        #formSurat {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 16px;
        }

        /* INPUT GROUP */
        .input-group {
            position: relative;
        }

        /* ICON */
        .input-group i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            font-size: 13px;
        }

        /* INPUT */
        .input-group input,
        .input-group select {
            width: 100%;
            height: 42px;
            padding: 0 12px 0 35px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: rgba(176, 190, 248, 0.9);
            color: #f1f5f9;
            font-size: 13px;
            transition: all 0.25s ease;
        }

        /* HOVER */
        .input-group input:hover,
        .input-group select:hover {
            border-color: #475569;
        }

        /* FOCUS */
        .input-group input:focus,
        .input-group select:focus {
            border-color: #3b82f6;
            box-shadow:
                0 0 0 2px rgba(59, 130, 246, 0.2),
                0 0 12px rgba(59, 130, 246, 0.4);
            outline: none;
        }

        /* DATE */
        input[type="date"] {
            cursor: pointer;
        }

        /* ================= BUTTON ================= */
        button {
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: 0.25s;
        }

        /* SAVE */
        .btn-save {
            grid-column: 1 / -1;
            height: 45px;
            background: linear-gradient(135deg, #3b82f6, #22c55e);
            color: #fff;
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow:
                0 8px 25px rgba(59, 130, 246, 0.4),
                0 0 15px rgba(34, 197, 94, 0.4);
        }

        /* ================= FILTER ================= */
        .filter-box {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .filter-box input {
            flex: 1;
            min-width: 220px;
        }

        /* ================= TABLE ================= */
        .table-wrapper {
            overflow-x: auto;
            border-radius: 12px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            color: #edeef0;
        }

        /* HEADER */
        th {
            background: linear-gradient(135deg, #1e293b, #020617);
            padding: 14px;
            border: 1px solid #334155;
            font-size: 12px;
            text-transform: uppercase;
            color: #38bdf8;
        }

        /* CELL */
        td {
            padding: 12px;
            border: 1px solid #334155;
            font-size: 13px;
        }

        /* STRIPED */
        tr:nth-child(even) {
            background: rgba(255, 255, 255, 0.02);
        }

        /* HOVER */
        tr:hover {
            background: linear-gradient(135deg,
                    rgba(59, 130, 246, 0.2),
                    rgba(168, 85, 247, 0.15));
        }

        /* ================= BUTTON TABLE ================= */
        .btn-edit {
            background: linear-gradient(135deg, #38bdf8, #3b82f6);
            color: #fff;
            padding: 6px 10px;
            border-radius: 6px;
        }

        .btn-delete {
            background: linear-gradient(135deg, #ef4444, #b91c1c);
            color: #fff;
            padding: 6px 10px;
            border-radius: 6px;
        }

        .btn-edit:hover,
        .btn-delete:hover {
            transform: scale(1.05);
        }

        /* ================= AUTOCOMPLETE ================= */
        .autocomplete {
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            background: #1860f0;
            border: 1px solid #ffffff;
            border-radius: 8px;
            overflow: hidden;
            z-index: 999;
        }

        .autocomplete div {
            padding: 10px;
            cursor: pointer;
        }

        .autocomplete div:hover {
            background: #1e293b;
        }

        /* ================= LOADING ================= */
        #loading {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .loader {
            width: 45px;
            height: 45px;
            border: 4px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        /* ================= NAVBAR ================= */
        #mainNavbar {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            padding: 0.8rem 1rem;
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            box-shadow:
                0 4px 20px rgba(0, 0, 0, 0.6),
                0 0 10px rgba(59, 130, 246, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #mainNavbar .navbar-brand {
            font-weight: 700;
            font-size: 1.25rem;
            color: #fff;
            text-decoration: none;
        }

        #mainNavbar .navbar-brand i {
            margin-right: 8px;
            color: #22c55e;
        }

        #mainNavbar .nav-links {
            display: flex;
            gap: 1rem;
        }

        #mainNavbar .nav-link {
            color: #fff;
            padding: 6px 10px;
            border-radius: 6px;
            transition: 0.3s;
        }

        #mainNavbar .nav-link:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #22c55e;
        }

        /* ================= BUTTON ACTION ================= */
        .btn-action {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: #000;
            border-radius: 8px;
            padding: 8px 14px;
            font-weight: 600;
        }

        .btn-action:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(34, 197, 94, 0.4);
        }

        /* ================= ANIMATION ================= */
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ================= RESPONSIVE ================= */
        @media (max-width: 768px) {
            #formSurat {
                grid-template-columns: 1fr;
            }

            table {
                min-width: 600px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 15px;
            }

            .filter-box {
                flex-direction: column;
            }
        }

        /* ================= PRINT ================= */
        @media print {
            .col-aksi {
                display: none !important;
            }

            body {
                background: #fff;
                color: #000;
            }

            th,
            td {
                border: 1px solid #000;
                color: #000;
                background: #fff !important;
            }
        }

        /* ================= PRINT ================= */
        @media print {

            /* Sembunyikan kolom aksi sepenuhnya */
            .col-aksi {
                display: none !important;
            }

            /* Tabel full width */
            table {
                width: 100% !important;
                border-collapse: collapse;
            }

            th,
            td {
                border: 1px solid #333;
                padding: 6px;
                font-size: 12px;
                color: #000;
                background: #fff !important;
            }

            body {
                color: #000;
                background: #fff;
                print-color-adjust: exact;
                -webkit-print-color-adjust: economy;
            }
        }
    </style>
</head>

<body>
    <h2 class="page-title">ARSIP SURAT MASUK</h2>

    <div id="loading">
        <div class="loader"></div>
    </div>

    <!-- Navbar -->
    <nav id="mainNavbar" class="navbar fixed-top shadow-sm py-2">
        <div class="container d-flex justify-content-between align-items-center">
            <!-- Judul -->
            <a class="navbar-brand d-flex align-items-center" href="#">
                <i class="bi bi-gear-fill me-2"></i> Arsip Surat Bidang P3
            </a>

            <!-- Menu Navigasi -->
            <div class="nav-links d-flex align-items-center">
                <a href="fomulir.html" class="nav-link" title="Formulir PPAT">
                    <i class="bi bi-file-earmark-text me-1"></i> Formulir PPAT
                </a>
                <a href="table.html" class="nav-link" onclick="logout()" title="Logout">
                    <i class="bi bi-box-arrow-right me-1"></i> LOGOUT
                </a>
            </div>
        </div>
    </nav>

    <!-- Spacer agar konten tidak tertutup navbar -->
    <div style="height: 80px;"></div>

    <div class="container">

        <!-- FORMULIR -->
        <form id="formSurat" class="card">

            <div class="input-group">
                <i class="fa-solid fa-user-tie"></i>
                <input type="text" id="nama_notaris" placeholder="Ketik Nama Notaris" required>
                <div id="suggestions" class="autocomplete"></div>
            </div>

            <div class="input-group">
                <i class="fa-solid fa-calendar-days"></i>
                <input type="date" id="tanggal_surat" required>
                <labal>TANGGAL SURAT</labal>
            </div>

            <div class="input-group">
                <i class="fa-solid fa-calendar-check"></i>
                <input type="date" id="tanggal_diterima" required>
                <labal>TANGGAL DITERIMA</labal>
            </div>

            <div class="input-group">
                <i class="fa-solid fa-file-lines"></i>
                <select id="judul_surat" required>
                    <option value="">Pilih Judul</option>
                    <option>Laporan Bulanan PPAT</option>
                    <option>Surat Permohonan</option>
                    <option>Surat Klarfikasi</option>
                </select>
            </div>

            <div class="input-group">
                <i class="fa-solid fa-building"></i>
                <select id="dari_bidang" required>
                    <option value="">Pilih Bidang</option>
                    <option>Sekretariat</option>
                    <option>Bidang P1</option>
                    <option>Bidang P2</option>
                </select>
            </div>

            <div class="input-group">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="nama_penerima" placeholder="Nama Pengantar">
                <labal>NAMA PENGANTAR</labal>
            </div>

            <button class="btn-save">
                <i class="fa-solid fa-paper-plane"></i> Simpan Data
            </button>

        </form>

        <div class="filter-box card">

            <div class="input-group">
                <i class="fa-solid fa-search"></i>
                <input type="text" id="filterNama" placeholder="Cari Nama">
            </div>

            <div class="input-group">
                <i class="fa-solid fa-calendar"></i>
                <input type="date" id="filterTanggal">
            </div>

        </div>

        <!-- TOMBOL PRINT & EXPORT -->
        <td class="col-aksi">
            <div class="d-flex mb-3 gap-2">
                <button class="btn-action" onclick="printTable()">
                    <i class="bi bi-printer"></i> Print
                </button>
                <button class="btn-action" onclick="exportExcel()">
                    <i class="bi bi-file-earmark-spreadsheet-fill me-1"></i> Export Excel
                </button>
            </div>

            <select id="filterBulan">
                <option value="">Semua Bulan</option>
                <option value="01">Januari</option>
                <option value="02">Februari</option>
                <option value="03">Maret</option>
                <option value="04">April</option>
                <option value="05">Mei</option>
                <option value="06">Juni</option>
                <option value="07">Juli</option>
                <option value="08">Agustus</option>
                <option value="09">September</option>
                <option value="10">Oktober</option>
                <option value="11">November</option>
                <option value="12">Desember</option>
            </select>

            <select id="filterTahun">
                <option value="">Semua Tahun</option>
            </select>

            <!-- TABLE -->
            <div class="card">
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>No</th>
                                <th>Nama Notaris/PPAT</th>
                                <th>Tanggal Teriama</th>
                                <th>Tanggal Surat</th>
                                <th>Judul</th>
                                <th>Jam</th>
                                <th>Bidang</th>
                                <th>Pengantar</th>
                                <th>Paraf</th>
                                <th class="col-aksi">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="dataTable"></tbody>
                    </table>
                </div>
            </div>
            <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

            <script>
                let allData = [];
                let editRow = null;

                const URL = "https://script.google.com/macros/s/AKfycbxBPk35mPtrfjM2NByQIPH0h94qINdx0pG9LfGhIFE1UcSKb1YBod4Db6HTbaKiAwyf4g/exec";

                const namaInput = document.getElementById("nama_notaris");
                const suggestions = document.getElementById("suggestions");

                namaInput.addEventListener("input", () => {
                    let keyword = namaInput.value.toLowerCase();
                    suggestions.innerHTML = "";

                    if (!keyword) {
                        suggestions.style.display = "none";
                        return;
                    }

                    let hasil = defaultNotaris.filter(n =>
                        n.toLowerCase().includes(keyword)
                    );

                    hasil.forEach(n => {
                        let div = document.createElement("div");
                        div.textContent = n;

                        div.onclick = () => {
                            namaInput.value = n;
                            suggestions.style.display = "none";
                        };

                        suggestions.appendChild(div);
                    });

                    suggestions.style.display = hasil.length ? "block" : "none";
                });

                document.addEventListener("click", e => {
                    if (!e.target.closest("form")) {
                        suggestions.style.display = "none";
                    }
                });

                /* =========================
                   FUNGSI LOGIN DAN LOGOUT
                ========================= */
                function cekLogin() {
                    const token = localStorage.getItem("token");

                    // Jika token tidak ada, redirect ke table.html
                    if (!token) {
                        console.warn("Token tidak ditemukan, redirect ke table.html");
                        window.location.href = "table.html";
                        return;
                    }

                    // Cek token ke server langsung tanpa const URL
                    fetch("https://script.google.com/macros/s/AKfycbzowWO-hNgGMr3UDA-9Nn4z8_4HfhIDGGVLc_bG9_eNyCieTzQxzR_MKcIdLJzjOpUg/exec?action=check&token=" + encodeURIComponent(token))
                        .then(res => {
                            if (!res.ok) throw new Error("Response tidak OK");
                            return res.json();
                        })
                        .then(data => {
                            if (data.status !== "valid") {
                                console.warn("Token tidak valid, hapus dan redirect");
                                localStorage.removeItem("token");
                                window.location.href = "table.html";
                            } else {
                                console.log("Token valid, akses diterima");
                            }
                        })
                        .catch(err => {
                            console.error("Terjadi error saat cek login:", err);
                            window.location.href = "table.html";
                        });
                }

                // Jalankan cekLogin saat halaman dibuka
                document.addEventListener("DOMContentLoaded", cekLogin);

                // Fungsi LogOut
                function logout() {
                    localStorage.removeItem("token");
                    window.location.href = "table.html";
                }

                /* ================= LOAD DATA ================= */
                function loadData() {
                    document.getElementById("loading").style.display = "flex";

                    fetch(URL) // ⬅️ GET, bukan POST
                        .then(res => res.json())
                        .then(data => {
                            allData = data; // simpan data
                            render();       // tampilkan ke tabel
                        })
                        .catch(err => {
                            console.error(err);
                            alert("Gagal load data!");
                        })
                        .finally(() => {
                            document.getElementById("loading").style.display = "none";
                        });
                }

                /* ================= RENDER ================= */
                function render() {
                    let html = "";

                    const filterNama = document.getElementById("filterNama").value.toLowerCase();
                    const filterTanggal = document.getElementById("filterTanggal").value;
                    const filterBulan = document.getElementById("filterBulan").value;
                    const filterTahun = document.getElementById("filterTahun").value;

                    allData.forEach(d => {

                        if (filterNama && !d.nama.toLowerCase().includes(filterNama)) return;

                        if (filterTanggal && d.tgl_surat != filterTanggal) return;

                        // 🔥 FILTER BULAN
                        if (filterBulan && d.tgl_surat.substring(5, 7) !== filterBulan) return;

                        // 🔥 FILTER TAHUN
                        if (filterTahun && d.tgl_surat.substring(0, 4) !== filterTahun) return;

                        html += `
                        <tr>
                            <td>${d.no}</td>
                            <td>${d.nama}</td>
                            <td>${d.tgl_terima}</td>
                            <td>${d.tgl_surat}</td>
                            <td>${d.judul}</td>
                            <td>${d.jam}</td>
                            <td>${d.bidang}</td>
                            <td>${d.pengantar}</td>
                            <td>${d.paraf || ""}</td>
                            <td class="col-aksi">
                                <button onclick="editData(${d.row})">Edit</button>
                                <button onclick="hapus(${d.row})">Hapus</button>
                            </td>
                        </tr>
                        `;
                    });

                    document.getElementById("dataTable").innerHTML = html;
                    document.getElementById("filterBulan").addEventListener("change", render);
                    document.getElementById("filterTahun").addEventListener("change", render);
                }

                const defaultNotaris = [
                    "AMELIA MERDEKA SARI, S.H., M.Kn",
                    "ANJAR KRISTIANTO, S.H., M.Kn",
                    "ATMIWIJAYA ARTATI, S.H., M.Kn",
                    "ANGGA PRISMA JELITA, S.H.,M.Kn",
                    "ANNISA FADILLA KARTAMADJA,S.H., M.Kn",
                    "AULIYYA MARTATI, S.H., M.H",
                    "ARDANA RESTIKA, S.H.,M.Kn",
                    "AZIZA ADLIEN NABILA, S.H.,M.Kn",
                    "BERTHA NOVELISA, S.H., M.Kn",
                    "BJANZA METRA, S.H.,M.Kn",
                    "BELLA FILDA AGATHA,S.H.,M.Kn",
                    "CHRISTINE, S.H.,M.Kn",
                    "DENI YOHANES, S.H., M.Kn",
                    "DAUD WIDYA PRANATA SEPTI, S.H.,M.Kn",
                    "DENI KRISTIAN NATANAEL, S.H,.M.Kn",
                    "DESRIANO INDRA SYAHPUTRA, S.H.,M.Kn",
                    "DORA YULIA AGUSTINA, S.H.,M.Kn",
                    "DWI FANI ARSIKASINDI, S.H.,M.H",
                    "EMY EFRIANTI AGUSTINI, S.H., M.Kn",
                    "HARITRI GRATA JOHNI ARIFIN PUTRI, S.H., M.Kn",
                    "HELEN SAPARINGGA,S.H., M.Kn",
                    "H. EPISON, S.H",
                    "H. MUFTI NOKHMAN, S.H.,M.Kn",
                    "IDAYANTI, S.H",
                    "IS HARIYANI,S.H",
                    "ILHAM RAHMADI, SH",
                    "INDAH ARIESTIA, S.H",
                    "IRAWAN, S.H",
                    "JULIWATI SIAGIAN, S.H,M.Kn",
                    "KARTINI KESUMAWATY,S.H.,M.Kn",
                    "KAHIRUNNISA,S.H.,M.Kn",
                    "KUSWARI AHMAD,S.H",
                    "LYDIA ARMAN, S.H.,M.Kn",
                    "LINDA OKTARINA,S.H",
                    "MIRZA,S.H.,M.Kn",
                    "NOVIARTATI,S.H",
                    "RANDI WIBOWO,S.H.,M.Kn",
                    "RIZFITRIANI ALAMSYAH, S.H.,M.Kn",
                    "SARI PRIYANIKA,S.H.,M.Kn",
                    "SUSANTI,S.H.,M.Kn",
                    "SARI INDRA,S.H.,M.Kn",
                    "SHINTA WIDYANTI,S.H.,M.Kn",
                    "SICILIA HENDRA,S.H.,M.Kn",
                    "SHABRINA ZHAFIRA,S.H.,M.Kn",
                    "SISKA WIDIA ASTUTI, S.H.,M.Kn",
                    "TINA HAREANI, BUGGASI, S.H.,M.Kn",
                    "TIARA YUNITA OVELIA,S.H.,M.Kn",
                    "VIKE DIANTI PUTRI,S.H.,M.Kn",
                    "VINANDIA LOVITA,S.H.,M.Kn",
                    "WENY ARIAMBI CRISTIANI,SST.Par.,S.H.,M.Kn"
                ];

                /* ================= SUBMIT ================= */
                document.getElementById("formSurat").addEventListener("submit", function (e) {
                    e.preventDefault();

                    document.getElementById("loading").style.display = "flex";

                    let payload = {
                        nama: nama_notaris.value,
                        tgl_surat: tanggal_surat.value,
                        tgl_terima: tanggal_diterima.value,
                        judul: judul_surat.value,
                        bidang: dari_bidang.value,
                        pengantar: nama_penerima.value,
                        paraf: ""
                    };

                    if (editRow) {
                        payload.action = "update";
                        payload.row = editRow;
                    }

                    fetch(URL, {
                        method: "POST",
                        body: JSON.stringify(payload)
                    })
                        .then(res => res.text())
                        .then(data => {
                            console.log(data);

                            formSurat.reset();
                            editRow = null;

                            return fetch(URL); // Ambil ulang data
                        })
                        .then(res => res.json())
                        .then(data => {
                            allData = data;
                            initFilterTahun();
                            render();
                        })
                        .catch(err => {
                            alert("Gagal kirim data!");
                            console.error(err);
                        })
                        .finally(() => {
                            document.getElementById("loading").style.display = "none";
                        });
                });

                /* ================= EDIT ================= */
                function editData(row) {
                    let d = allData.find(x => x.row == row);

                    nama_notaris.value = d.nama;
                    tanggal_surat.value = d.tgl_surat;
                    tanggal_diterima.value = d.tgl_terima;
                    judul_surat.value = d.judul;
                    dari_bidang.value = d.bidang;
                    nama_penerima.value = d.pengantar;

                    editRow = row;
                }

                /* ================= HAPUS ================= */
                function hapus(row) {
                    if (!confirm("Yakin hapus?")) return;

                    fetch(URL, {
                        method: "POST",
                        body: JSON.stringify({
                            action: "delete",
                            row: row
                        })
                    })
                        .then(() => loadData());
                }

                /* ================= FILTER ================= */
                document.getElementById("filterNama").addEventListener("input", render);
                document.getElementById("filterTanggal").addEventListener("change", render);

                /* ================= INIT ================= */
                loadData();

                /* ================= PRINT TABLE ================= */
                function printTable() {
                    // Ambil table asli
                    let table = document.querySelector('.table-wrapper table');
                    // Clone table supaya aman
                    let tableClone = table.cloneNode(true);

                    // Hapus kolom aksi
                    tableClone.querySelectorAll('.col-aksi').forEach(el => el.remove());

                    // Buat jendela baru untuk print
                    let newWin = window.open('', '', 'width=900,height=700');
                    newWin.document.write(`
                            <html>
                        <head>
                            <title>Print Table</title>
                            <style>
                                body { font-family: Arial, sans-serif; padding: 20px; color: #000; background: #fff; }
                                h2 { text-align: center; margin-bottom: 20px; }
                                table { border-collapse: collapse; width: 100%; }
                                th, td { border: 1px solid #333; padding: 8px; text-align: left; font-size: 12px; }
                                th { background: #2563eb; color: #fff; }
                                tr:nth-child(even) { background: #f2f2f2; }
                            </style>
                        </head>
                        <body>
            <h2>Arsip Surat Masuk</h2>
            ${tableClone.outerHTML}
        </body>
        </html>
    `);
                    newWin.document.close();
                    newWin.print();
                }

                /* ================= EXPORT EXCEL ================= */
                function exportExcel() {
                    let table = document.querySelector('table');
                    let wb = XLSX.utils.table_to_book(table, { sheet: "Arsip Surat" });
                    XLSX.writeFile(wb, 'Arsip_Surat.xlsx');
                }

                function initFilterTahun() {
                    let tahunSet = new Set();

                    allData.forEach(d => {
                        if (d.tgl_surat) {
                            let tahun = d.tgl_surat.substring(0, 4);
                            tahunSet.add(tahun);
                        }
                    });

                    let select = document.getElementById("filterTahun");
                    select.innerHTML = '<option value="">Semua Tahun</option>';

                    [...tahunSet].sort().forEach(t => {
                        let opt = document.createElement("option");
                        opt.value = t;
                        opt.textContent = t;
                        select.appendChild(opt);
                    });
                }

            </script>

</body>

</html>
