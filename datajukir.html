<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cetak Berita Acara - BAPENDA Kota Bengkulu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%);
            min-height: 100vh;
            font-family: 'Poppins', 'Work Sans', sans-serif;
            padding-top: 70px;
        }

        /* Navbar Style */
        #mainNavbar {
            background: linear-gradient(135deg, #0284c7, #38bdf8) !important;
            box-shadow: 0 4px 20px rgba(2, 132, 199, 0.3);
            padding: 8px 0;
        }

        #mainNavbar .navbar-brand {
            font-weight: 700;
            font-size: 1.1rem;
            color: white !important;
        }

        #mainNavbar .nav-link {
            color: rgba(255, 255, 255, 0.95);
            transition: all 0.3s ease;
            padding: 8px 15px;
            border-radius: 30px;
            text-decoration: none;
        }

        #mainNavbar .nav-link:hover {
            background: rgba(255, 255, 255, 0.25);
            color: white;
            transform: translateY(-2px);
        }

        .nav-links {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .btn-outline-light {
            border-color: rgba(255, 255, 255, 0.5);
            color: white;
        }

        .btn-outline-light:hover {
            background: white;
            color: #0284c7;
        }

        .card-modern {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            border: none;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
        }

        .btn-primary-modern {
            background: linear-gradient(135deg, #0284c7, #38bdf8);
            border: none;
            border-radius: 40px;
            padding: 12px 30px;
            font-weight: 600;
            transition: all 0.3s ease;
            color: white;
        }

        .btn-primary-modern:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(2, 132, 199, 0.3);
        }

        .form-select-modern {
            border-radius: 16px;
            border: 1px solid #cbd5e1;
            padding: 12px 16px;
        }

        .form-select-modern:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
        }

        .info-card {
            background: #f0f9ff;
            border-radius: 16px;
            padding: 15px;
            border-left: 4px solid #0284c7;
        }

        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .spinner-custom {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Badge role */
        .badge-role {
            background: rgba(0, 0, 0, 0.2);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            margin-left: 10px;
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav id="mainNavbar" class="navbar fixed-top shadow-sm py-2">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <i class="bi bi-file-text-fill me-2"></i> Cetak Berita Acara
            </a>
            <div class="nav-links d-flex align-items-center">
                <button class="btn btn-sm btn-outline-light me-2" onclick="refreshData()" title="Refresh Data">
                    <i class="bi bi-arrow-repeat"></i>
                </button>
                <a href="dashbord.html" class="nav-link" title="Dashboard">
                    <i class="bi bi-speedometer2"></i>
                </a>
                <a href="fomulir.html" class="nav-link" title="Formulir PPAT">
                    <i class="bi bi-file-earmark-text"></i>
                </a>
                <a href="#" class="nav-link" onclick="logout()" title="Logout">
                    <i class="bi bi-box-arrow-right"></i>
                </a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card card-modern">
                    <div class="card-body p-4 p-md-5 text-center">

                        <img src="https://lh3.googleusercontent.com/d/1VJ8sMX4zC4_W7uZCiVCFvYJ22mXia57x=s200" alt="Logo"
                            style="width: 90px; margin-bottom: 20px;">

                        <h3 class="fw-bold text-primary">
                            <i class="bi bi-file-text-fill"></i> Cetak Berita Acara
                        </h3>
                        <p class="text-muted mb-4">Verifikasi Laporan Notaris dan PPAT</p>

                        <hr>

                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">
                                    <i class="bi bi-calendar-month"></i> Bulan
                                </label>
                                <select id="bulanSelect" class="form-select form-select-modern">
                                    <option value="">-- Pilih Bulan --</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">
                                    <i class="bi bi-calendar"></i> Tahun
                                </label>
                                <select id="tahunSelect" class="form-select form-select-modern">
                                    <option value="">-- Pilih Tahun --</option>
                                </select>
                            </div>
                        </div>

                        <button id="cetakBtn" class="btn btn-primary-modern w-100 mt-4" onclick="cetakBeritaAcara()">
                            <i class="bi bi-printer-fill"></i> Cetak Berita Acara
                        </button>

                        <hr class="my-4">

                        <div class="info-card text-start">
                            <div class="d-flex gap-3">
                                <i class="bi bi-info-circle-fill text-primary fs-3"></i>
                                <div>
                                    <strong>Informasi</strong><br>
                                    <small>Data diambil otomatis dari Database.<br>
                                        Notaris pensiun terdeteksi otomatis.<br>
                                        Berita Acara akan dicetak dalam format A4.
                                    </small>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner-custom"></div>
        <p class="text-white mt-3 fw-semibold">Sedang menyiapkan Berita Acara...</p>
        <p class="text-white-50 small">Mohon tunggu sebentar</p>
    </div>

    <script>
        // ============================================
        // FUNGSI BERITA ACARA
        // ============================================
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxqLwCKGOvC9WfnJ624Zh0ce3rv6QNGGPybaDoAQlnL76yeUitQfROrOksboTO_Garv/exec";

        // ============================================
        // FUNGSI PEMBATASAN AKSES
        // ============================================
        const URL_API = "https://script.google.com/macros/s/AKfycbwXsh3qJO8w1hvrroyI71-UIyxbK6TOhYyPezJnH7PofB2DB3b6h6Yk69EZ8bVbSGAH/exec";
        let currentUserRole = null;
        let currentUserName = null;
        let currentUserEmail = null;

        async function checkLoginAndRole() {
            const token = localStorage.getItem("token");
            if (!token) {
                window.location.href = "table.html";
                return false;
            }

            try {
                const response = await fetch(`${URL_API}?action=getUserData&token=${token}`);
                const userData = await response.json();

                if (userData.status !== "success") {
                    localStorage.removeItem("token");
                    window.location.href = "table.html";
                    return false;
                }

                currentUserRole = userData.role;
                currentUserName = userData.name;
                currentUserEmail = userData.email;

                localStorage.setItem("userRole", userData.role);
                localStorage.setItem("userName", userData.name);

                updateNavbarForRole(userData.role, userData.name);

                return true;

            } catch (error) {
                console.error("Error checking login:", error);
                return false;
            }
        }

        function updateNavbarForRole(role, name) {
            const navbarContainer = document.querySelector('#mainNavbar .container');
            if (navbarContainer && !document.getElementById('roleBadgeNav')) {
                const roleBadge = document.createElement('div');
                roleBadge.id = 'roleBadgeNav';
                roleBadge.className = 'ms-3 me-2';

                if (role === 'admin') {
                    roleBadge.innerHTML = '<span class="badge bg-danger"><i class="bi bi-suitcase-lg-fill"></i> Hello! Administrator</span>';
                } else {
                    roleBadge.innerHTML = '<span class="badge bg-warning text-dark"><i class="bi bi-person-arms-up"></i> Hello! User</span>';
                }

                const logoutBtn = document.querySelector('a[title="Logout"]');
                if (logoutBtn) {
                    navbarContainer.insertBefore(roleBadge, logoutBtn);
                } else {
                    navbarContainer.appendChild(roleBadge);
                }
            }
        }

        function disableEditingForUser() {
            const editButtons = document.querySelectorAll('.btn-primary, .btn-success, .btn-warning');
            editButtons.forEach(btn => {
                const btnText = btn.innerText.toLowerCase();
                if (btnText.includes('simpan') || btnText.includes('edit') || btnText.includes('tambah') ||
                    btnText.includes('update') || btnText.includes('kirim') || btnText.includes('upload')) {
                    btn.disabled = true;
                    btn.style.opacity = '0.5';
                    btn.style.cursor = 'not-allowed';
                    btn.title = 'Fitur hanya untuk ADMIN';
                }
            });

            const inputs = document.querySelectorAll('input:not([readonly]), textarea:not([readonly]), select:not([disabled])');
            inputs.forEach(input => {
                input.setAttribute('readonly', true);
                input.setAttribute('disabled', true);
                input.style.backgroundColor = '#f0f0f0';
                input.style.cursor = 'not-allowed';
            });
        }

        function showPrintOnlyNotification() {
            const notification = document.createElement('div');
            notification.id = 'printOnlyNotification';
            notification.innerHTML = `
                <div style="position: fixed; top: 70px; right: 20px; z-index: 9999; 
                            background: linear-gradient(135deg, #ffa502, #ff7f50); 
                            color: white; padding: 12px 20px; border-radius: 30px; 
                            box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
                            display: flex; align-items: center; gap: 10px;
                            animation: slideInRight 0.5s ease;">
                    <i class="bi bi-printer-fill" style="font-size: 1.2rem;"></i>
                    <span><strong>Mode Print Only</strong><br><small>Anda hanya bisa melihat dan mencetak data</small></span>
                    <button onclick="this.parentElement.remove()" style="background: none; border: none; color: white; font-size: 1.2rem;">&times;</button>
                </div>
                <style>
                    @keyframes slideInRight {
                        from { transform: translateX(100%); opacity: 0; }
                        to { transform: translateX(0); opacity: 1; }
                    }
                </style>
            `;
            document.body.appendChild(notification);
            setTimeout(() => {
                const notif = document.getElementById('printOnlyNotification');
                if (notif) notif.remove();
            }, 5000);
        }

        function logout() {
            Swal.fire({
                title: 'Konfirmasi Logout',
                text: 'Apakah Anda yakin ingin keluar?',
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: '#3085d6',
                confirmButtonText: 'Ya, Logout!',
                cancelButtonText: 'Batal'
            }).then((result) => {
                if (result.isConfirmed) {
                    localStorage.removeItem("token");
                    localStorage.removeItem("userRole");
                    localStorage.removeItem("userName");
                    window.location.href = "table.html";
                }
            });
        }

        // ============================================
        // FUNGSI UTAMA
        // ============================================

        // Urutan bulan
        const urutanBulan = {
            "Januari": 1, "Februari": 2, "Maret": 3, "April": 4,
            "Mei": 5, "Juni": 6, "Juli": 7, "Agustus": 8,
            "September": 9, "Oktober": 10, "November": 11, "Desember": 12
        };

        // Data bulan dan tahun yang tersedia
        let semuaDataLaporan = [];  // Simpan semua data untuk filtering

        // Load data dari Apps Script
        async function loadDataPeriode() {
            const bulanSelect = document.getElementById('bulanSelect');
            const tahunSelect = document.getElementById('tahunSelect');

            bulanSelect.innerHTML = '<option value="">Memuat data...</option>';
            tahunSelect.innerHTML = '<option value="">Memuat data...</option>';

            try {
                const response = await fetch(APPS_SCRIPT_URL);
                const data = await response.json();

                // Simpan semua data untuk filtering nanti
                semuaDataLaporan = Array.isArray(data) ? data : [];

                // Kumpulkan bulan dan tahun unik dari SEMUA data (termasuk data mendatang)
                const bulanSet = new Set();
                const tahunSet = new Set();

                for (var i = 0; i < semuaDataLaporan.length; i++) {
                    var bulanLaporan = semuaDataLaporan[i]["laporan_bulanan"];
                    if (bulanLaporan) {
                        var parts = bulanLaporan.split(' ');
                        var bulan = parts[0];
                        var tahun = parts[1];

                        if (bulan && urutanBulan[bulan]) {
                            bulanSet.add(bulan);
                        }
                        if (tahun) {
                            tahunSet.add(parseInt(tahun));
                        }
                    }
                }

                // Jika tidak ada data, gunakan bulan dan tahun saat ini
                if (bulanSet.size === 0) {
                    const now = new Date();
                    const bulanNow = now.toLocaleString('id-ID', { month: 'long' });
                    const tahunNow = now.getFullYear();
                    bulanSet.add(bulanNow);
                    tahunSet.add(tahunNow);
                }

                // Urutkan bulan berdasarkan urutan
                var bulanList = Array.from(bulanSet).sort(function (a, b) {
                    return urutanBulan[a] - urutanBulan[b];
                });

                // Urutkan tahun dari terbaru ke terlama
                var tahunList = Array.from(tahunSet).sort(function (a, b) {
                    return b - a;
                });

                // Isi dropdown bulan (SEMUA bulan yang pernah ada data)
                bulanSelect.innerHTML = '<option value="">-- Pilih Bulan --</option>';
                for (var i = 0; i < bulanList.length; i++) {
                    bulanSelect.innerHTML += `<option value="${bulanList[i]}">${bulanList[i]}</option>`;
                }

                // Isi dropdown tahun
                tahunSelect.innerHTML = '<option value="">-- Pilih Tahun --</option>';
                for (var i = 0; i < tahunList.length; i++) {
                    tahunSelect.innerHTML += `<option value="${tahunList[i]}">${tahunList[i]}</option>`;
                }

                // Auto pilih tahun terbaru
                if (tahunList.length > 0) {
                    tahunSelect.value = tahunList[0];
                }

                console.log("Semua bulan yang pernah ada:", bulanList);
                console.log("Semua tahun:", tahunList);

                // Event listener untuk filter bulan berdasarkan tahun
                tahunSelect.addEventListener('change', function () {
                    filterBulanByTahun();
                });

                // Filter awal
                if (tahunSelect.value) {
                    filterBulanByTahun();
                } else if (tahunList.length > 0) {
                    tahunSelect.value = tahunList[0];
                    filterBulanByTahun();
                }

            } catch (error) {
                console.error("Gagal ambil data periode:", error);
                bulanSelect.innerHTML = '<option value="">-- Pilih Bulan --</option>';
                tahunSelect.innerHTML = '<option value="">-- Pilih Tahun --</option>';

                // Fallback
                const now = new Date();
                const bulanNow = now.toLocaleString('id-ID', { month: 'long' });
                const tahunNow = now.getFullYear();
                bulanSelect.innerHTML += `<option value="${bulanNow}">${bulanNow}</option>`;
                tahunSelect.innerHTML += `<option value="${tahunNow}">${tahunNow}</option>`;
                tahunSelect.value = tahunNow;
            }
        }

        // Filter bulan berdasarkan tahun yang dipilih (HANYA bulan yang ADA DATA untuk tahun tersebut)
        async function filterBulanByTahun() {
            const tahun = document.getElementById('tahunSelect').value;
            const bulanSelect = document.getElementById('bulanSelect');

            if (!tahun) {
                bulanSelect.innerHTML = '<option value="">-- Pilih Bulan --</option>';
                return;
            }

            bulanSelect.innerHTML = '<option value="">Memuat bulan...</option>';

            try {
                // Gunakan data yang sudah disimpan
                const bulanSet = new Set();

                for (var i = 0; i < semuaDataLaporan.length; i++) {
                    var bulanLaporan = semuaDataLaporan[i]["laporan_bulanan"];
                    if (bulanLaporan && bulanLaporan.includes(tahun)) {
                        var bulan = bulanLaporan.split(' ')[0];
                        if (bulan && urutanBulan[bulan]) {
                            bulanSet.add(bulan);
                        }
                    }
                }

                // Urutkan bulan
                var bulanList = Array.from(bulanSet).sort(function (a, b) {
                    return urutanBulan[a] - urutanBulan[b];
                });

                bulanSelect.innerHTML = '<option value="">-- Pilih Bulan --</option>';
                for (var i = 0; i < bulanList.length; i++) {
                    bulanSelect.innerHTML += `<option value="${bulanList[i]}">${bulanList[i]}</option>`;
                }

                // Auto pilih bulan pertama jika ada
                if (bulanList.length > 0) {
                    bulanSelect.value = bulanList[0];
                }

                console.log(`Bulan untuk tahun ${tahun}:`, bulanList);
                console.log(`Total ${bulanList.length} bulan ditemukan`);

            } catch (error) {
                console.error("Gagal filter bulan:", error);
                bulanSelect.innerHTML = '<option value="">-- Pilih Bulan --</option>';
            }
        }

        // Fungsi untuk refresh data (bisa dipanggil manual atau otomatis periodik)
        function refreshData() {
            loadDataPeriode();
            Swal.fire({
                icon: 'success',
                title: 'Refresh Berhasil',
                text: 'Data periode telah diperbarui',
                timer: 1500,
                showConfirmButton: false
            });
        }

        // Auto refresh setiap 30 menit (opsional)
        setInterval(function () {
            loadDataPeriode();
            console.log("Auto refresh data periode");
        }, 30 * 60 * 1000); // 30 menit

        // Cetak Berita Acara
        async function cetakBeritaAcara() {
            const bulan = document.getElementById('bulanSelect').value;
            const tahun = document.getElementById('tahunSelect').value;

            if (!bulan || !tahun) {
                Swal.fire({
                    icon: 'warning',
                    title: 'Peringatan',
                    text: 'Pilih bulan dan tahun terlebih dahulu!',
                    confirmButtonColor: '#0284c7'
                });
                return;
            }

            const loading = document.getElementById('loadingOverlay');
            loading.style.display = 'flex';

            try {
                const url = `${APPS_SCRIPT_URL}?action=get_berita_acara&bulan=${encodeURIComponent(bulan)}&tahun=${tahun}`;
                const newWindow = window.open(url, '_blank');

                if (!newWindow) {
                    Swal.fire({
                        icon: 'error',
                        title: 'Popup Terblokir',
                        text: 'Mohon izinkan popup untuk halaman ini',
                        confirmButtonColor: '#dc3545'
                    });
                }
            } catch (error) {
                console.error('Error:', error);
                Swal.fire({
                    icon: 'error',
                    title: 'Gagal',
                    text: 'Terjadi kesalahan: ' + error.message,
                    confirmButtonColor: '#dc3545'
                });
            } finally {
                setTimeout(() => {
                    loading.style.display = 'none';
                }, 500);
            }
        }

        // Inisialisasi
        document.addEventListener('DOMContentLoaded', async function () {
            await checkLoginAndRole();
            await loadDataPeriode();
        });

        // Enter key support
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                cetakBeritaAcara();
            }
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>

</html>
